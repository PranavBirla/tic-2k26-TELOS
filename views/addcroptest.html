<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRISHIQ Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --primary: #16a34a;
  --bg: #f6f8fb;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e5e7eb;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

body { background: var(--bg); color: var(--text); }

/* HEADER */
.header {
  height: 70px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 40px;
  background: white;
  border-bottom: 1px solid var(--border);
}

.logo { font-weight: 700; font-size: 20px; color: var(--primary); }

.nav a {
  margin-left: 25px;
  text-decoration: none;
  color: var(--muted);
  font-size: 14px;
}

/* PAGE */
.page {
  max-width: 1200px;
  margin: 40px auto;
  padding: 0 20px;
}

.page h1 { font-size: 26px; margin-bottom: 6px; }
.page p { color: var(--muted); font-size: 14px; margin-bottom: 25px; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 25px;
}

.card {
  background: var(--card);
  border-radius: 14px;
  padding: 25px;
  border: 1px solid var(--border);
  box-shadow: 0 6px 20px rgba(0,0,0,0.04);
}

.section-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 15px;
}

/* FORM */
.form-group { margin-bottom: 18px; }

label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }

input, select, textarea {
  width: 100%;
  padding: 11px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #f9fafb;
  font-size: 14px;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--primary);
  background: white;
  box-shadow: 0 0 0 3px rgba(22,163,74,0.1);
}

.row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

textarea { height: 90px; }

/* UPLOAD */
.upload {
  border: 1.5px dashed var(--border);
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
}

.upload:hover { border-color: var(--primary); background: #f0fdf4; }

.upload i { font-size: 26px; color: var(--primary); margin-bottom: 10px; }

/* TIP */
.tip {
  margin-top: 20px;
  padding: 18px;
  border-radius: 12px;
  background: linear-gradient(135deg,#16a34a,#22c55e);
  color: white;
  font-size: 13px;
}

/* ACTION BAR */
.actions {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  border-top: 1px solid var(--border);
  padding: 15px 40px;
  display: flex;
  justify-content: flex-end;
  gap: 12px;
}

button {
  padding: 10px 22px;
  border-radius: 8px;
  font-size: 14px;
  border: none;
  cursor: pointer;
}

.cancel { background: #f1f5f9; }

.primary {
  background: var(--primary);
  color: white;
  box-shadow: 0 4px 12px rgba(22,163,74,0.2);
}

.primary:hover { background: #15803d; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">KRISHIQ</div>
  <div class="nav">
    <a href="#">Dashboard</a>
    <a href="#">Inventory</a>
    <a href="#">Reports</a>
  </div>
</div>

<div class="page">
  <h1>Add New Crop</h1>
  <p>Create a professional listing for your marketplace</p>

  <div class="grid">

    <div class="card">
      <div class="section-title">Crop Information</div>

      <div class="form-group">
        <label>Crop Name</label>
        <input type="text" placeholder="Premium Basmati Rice">
      </div>

      <div class="row">
        <div class="form-group">
          <label>Category</label>
          <select>
            <option>Grains</option>
            <option>Vegetables</option>
          </select>
        </div>

        <div class="form-group">
          <label>Harvest Date</label>
          <input type="date">
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Price (₹)</label>
          <input type="number">
        </div>

        <div class="form-group">
          <label>Quantity (kg)</label>
          <input type="number">
        </div>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea placeholder="Add crop quality, storage details..."></textarea>
      </div>

    </div>

    <div>
      <div class="card">
        <div class="section-title">Media Upload</div>
        <div class="upload">
          <i class="fa-solid fa-camera"></i>
          <p>Upload crop images</p>
        </div>
      </div>

      <div class="tip">
        Listings with images and proper pricing get 3x more engagement.
      </div>
    </div>

  </div>
</div>

<div class="actions">
  <button class="cancel">Cancel</button>
  <button class="primary">Publish</button>
</div>

</body>
</html>
